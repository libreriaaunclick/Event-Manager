# H2 in-memory database
# MySQL — replaces H2
spring.datasource.url=jdbc:mysql://localhost:3306/eventdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password={password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — validate only, Flyway handles schema now
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — enabled by default when dependency is present
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Silence the open-in-view warning
spring.jpa.open-in-view=false

# Server
server.port=8081
